<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Arial, Helvetica, sans-serif">
  <!-- White background -->
  <rect width="800" height="340" fill="#FFFFFF"/>

  <!-- Left panel label -->
  <text x="200" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Bounded / NotebookLM</text>

  <!-- Right panel label -->
  <text x="590" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">Open-Loop / General Chatbot</text>

  <!-- LEFT SIDE: Your Sources box -->
  <rect x="30" y="60" width="110" height="48" rx="6" fill="#009E73"/>
  <text x="85" y="82" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Your</text>
  <text x="85" y="98" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Sources</text>

  <!-- Arrow: Sources → Retrieval -->
  <line x1="140" y1="84" x2="178" y2="84" stroke="#000000" stroke-width="2"/>
  <polygon points="178,79 190,84 178,89" fill="#000000"/>

  <!-- Retrieval box -->
  <rect x="190" y="60" width="110" height="48" rx="6" fill="#56B4E9"/>
  <text x="245" y="82" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Retrieval</text>
  <text x="245" y="98" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold"> </text>

  <!-- Arrow: Retrieval → Response -->
  <line x1="300" y1="84" x2="338" y2="84" stroke="#000000" stroke-width="2"/>
  <polygon points="338,79 350,84 338,89" fill="#000000"/>

  <!-- Response box (left) -->
  <rect x="350" y="60" width="110" height="48" rx="6" fill="#009E73"/>
  <text x="405" y="82" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Response</text>
  <text x="405" y="98" text-anchor="middle" font-size="13" fill="#FFFFFF"> </text>

  <!-- Curved dashed citation return arrow: Response → Your Sources (arc below) -->
  <!-- Path going down and back left -->
  <path d="M 405 108 Q 245 180 85 108" fill="none" stroke="#009E73" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="85,108 73,103 73,113" fill="#009E73"/>
  <!-- Citation label -->
  <text x="245" y="175" text-anchor="middle" font-size="13" fill="#009E73" font-style="italic">citation</text>

  <!-- Vertical dashed divider -->
  <line x1="490" y1="40" x2="490" y2="290" stroke="#E69F00" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- RIGHT SIDE: Training Data box -->
  <rect x="510" y="60" width="110" height="48" rx="6" fill="#D55E00"/>
  <text x="565" y="82" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Training</text>
  <text x="565" y="98" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Data</text>

  <!-- Arrow: Training Data → Model -->
  <line x1="620" y1="84" x2="648" y2="84" stroke="#000000" stroke-width="2"/>
  <polygon points="648,79 660,84 648,89" fill="#000000"/>

  <!-- Model box -->
  <rect x="660" y="60" width="80" height="48" rx="6" fill="#0072B2"/>
  <text x="700" y="88" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Model</text>

  <!-- Arrow: Model → Response (right side) — goes down then to a box below -->
  <line x1="700" y1="108" x2="700" y2="135" stroke="#000000" stroke-width="2"/>
  <polygon points="695,135 700,147 705,135" fill="#000000"/>

  <!-- Response box (right) -->
  <rect x="644" y="147" width="112" height="48" rx="6" fill="#D55E00"/>
  <text x="700" y="169" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Response</text>
  <text x="700" y="185" text-anchor="middle" font-size="13" fill="#FFFFFF"> </text>

  <!-- No return arrow label -->
  <text x="640" y="220" text-anchor="middle" font-size="13" fill="#D55E00" font-style="italic">no citation path</text>

  <!-- Caption band -->
  <rect x="0" y="295" width="800" height="45" fill="#f5f5f5"/>
  <text x="400" y="321" text-anchor="middle" font-size="13" font-style="italic" fill="#000000">Every answer traces to a passage. If the passage isn't there, the answer isn't grounded.</text>
</svg>
