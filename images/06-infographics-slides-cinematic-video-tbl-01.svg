<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 212" font-family="Arial, Helvetica, sans-serif">
  <!-- White background -->
  <rect width="800" height="212" fill="#ffffff"/>

  <!-- Header row -->
  <rect x="0" y="10" width="800" height="50" fill="#0072B2"/>
  <text x="10" y="40" font-size="13" font-weight="bold" fill="#ffffff">Output</text>
  <text x="110" y="40" font-size="13" font-weight="bold" fill="#ffffff">What it generates</text>
  <text x="300" y="40" font-size="13" font-weight="bold" fill="#ffffff">What you edit</text>
  <text x="500" y="40" font-size="13" font-weight="bold" fill="#ffffff">Best use case</text>
  <text x="680" y="40" font-size="13" font-weight="bold" fill="#ffffff">18+ only?</text>

  <!-- Row 1 — Infographic -->
  <rect x="0" y="60" width="800" height="34" fill="#f5f5f5"/>
  <text x="10" y="82" font-size="13" fill="#000000">Infographic</text>
  <text x="110" y="82" font-size="13" fill="#000000">Visual summary in one of</text>
  <text x="300" y="82" font-size="13" fill="#000000">Verify factual accuracy; adjust</text>
  <text x="500" y="82" font-size="13" fill="#000000">Client briefs, executive</text>
  <text x="680" y="82" font-size="13" fill="#000000">Yes</text>
  <text x="110" y="97" font-size="13" fill="#000000">10 styles</text>
  <text x="300" y="97" font-size="13" fill="#000000">emphasis; replace weak visuals</text>
  <text x="500" y="97" font-size="13" fill="#000000">one-pagers, social sharing</text>

  <!-- Row 2 — Slide Deck -->
  <rect x="0" y="94" width="800" height="34" fill="#ffffff"/>
  <text x="10" y="116" font-size="13" fill="#000000">Slide Deck</text>
  <text x="110" y="116" font-size="13" fill="#000000">Presentation with title,</text>
  <text x="300" y="116" font-size="13" fill="#000000">Opener slide, thesis slide,</text>
  <text x="500" y="116" font-size="13" fill="#000000">Stakeholder presentations,</text>
  <text x="680" y="116" font-size="13" fill="#000000">No</text>
  <text x="110" y="131" font-size="13" fill="#000000">headers, bullets, citations</text>
  <text x="300" y="131" font-size="13" fill="#000000">closing synthesis — always</text>
  <text x="500" y="131" font-size="13" fill="#000000">client proposals, conference talks</text>

  <!-- Row 3 — Cinematic Video -->
  <rect x="0" y="128" width="800" height="34" fill="#f5f5f5"/>
  <text x="10" y="150" font-size="13" fill="#000000">Cinematic Video</text>
  <text x="110" y="150" font-size="13" fill="#000000">Narrated video with visual</text>
  <text x="300" y="150" font-size="13" fill="#000000">Cannot be edited after</text>
  <text x="500" y="150" font-size="13" fill="#000000">Explainer videos, onboarding,</text>
  <text x="680" y="150" font-size="13" fill="#000000">Yes</text>
  <text x="110" y="165" font-size="13" fill="#000000">elements from source content</text>
  <text x="300" y="165" font-size="13" fill="#000000">generation — regenerate if wrong</text>
  <text x="500" y="165" font-size="13" fill="#000000">overview communication</text>

  <!-- Column dividers -->
  <line x1="100" y1="10" x2="100" y2="162" stroke="#cccccc" stroke-width="1"/>
  <line x1="290" y1="10" x2="290" y2="162" stroke="#cccccc" stroke-width="1"/>
  <line x1="490" y1="10" x2="490" y2="162" stroke="#cccccc" stroke-width="1"/>
  <line x1="670" y1="10" x2="670" y2="162" stroke="#cccccc" stroke-width="1"/>

  <!-- Caption band -->
  <rect x="0" y="162" width="800" height="40" fill="#f5f5f5"/>
  <text x="10" y="187" font-size="13" font-style="italic" fill="#333333">All three are starting points. The model handles volume and consistency. You handle the slides and frames that carry the most cognitive weight.</text>
</svg>
